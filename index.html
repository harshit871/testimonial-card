<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Testimonial card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="icon" href="img/favicon.ico" sizes="any" />
  </head>
  <body>
    <main class="flex justify-center py-[200px]">
      <article
        class="w-[340px] flex flex-col gap-4 bg-white p-6 rounded-lg shadow-[0px_1px_2px_-1px_rgb(0_0_0_/_0.10),0px_1px_3px_0_rgb(0_0_0_/_0.10)]"
        aria-label="User testimonial from Sarah Dole"
      >
        <header class="flex items-center gap-4 self-stretch">
          <div class="w-12 h-12 shrink-0">
            <img
              class="w-12 h-12 object-cover"
              src="/img/profile-thumbnail.png"
              loading="lazy"
              alt="Portrait of Sarah Dole"
            />
          </div>
          <div class="flex flex-col gap-px grow">
            <h2 class="font-semibold text-lg text-justify text-neutral-900">
              Sarah Dole
            </h2>
            <p class="font-normal text-sm text-neutral-600">@sarahdole</p>
          </div>
        </header>
        <blockquote class="font-normal text-base text-neutral-600">
          I've been searching for high-quality abstract images for my design
          projects, and I'm thrilled to have found this platform. The variety
          and depth of creativity are astounding!
        </blockquote>
      </article>
    </main>

    <div class="credits" data-gfe-screenshot-exclude="true">
      A challenge by
      <a
        href="https://www.greatfrontend.com/projects?ref=challenges"
        target="_blank"
        >GreatFrontEnd Projects</a
      >. Built by
      <a
        href="https://www.greatfrontend.com/projects/u/harshitashva"
        target="_blank"
        >Harshit Soni</a
      >.
    </div>
    <script src="js/index.js"></script>
  </body>
</html>
